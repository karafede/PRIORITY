
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Legend Example (DOM Legends) | heatmap.js</title>
    <style>
     
   body, html, h2 { margin:0; padding:0; height:100%;}
      body { font-family:sans-serif; }
      body * { font-weight:200;}
      h1 { position:absolute; background:white; padding:10px;}
      #heatmapContainerWrapper { width:100%; height:100%; position:absolute; background:rgba(0,0,0,.1);}
	  #heatmapContainer { width:10%; height:10%; z-index: 700;}
	  
	  #map { height:100%; }
      .leaflet-container {
        background: rgba(0,0,0,.8) !important;
      }
	  
      #heatmapLegend { background:white; position:absolute; bottom:0; right:0; padding:10px;  z-index: 700;}
      #min { float:left; }
      #max { float:right; }
      h1 { position:absolute; background:black; color:white; padding:10px; font-weight:200;}
      #all-examples-info { position:absolute; background:white; font-size:16px; padding:20px; top:100px; width:350px; line-height:150%; border:1px solid rgba(0,0,0,.2);}
    </style>
  </head>
  <body>
    <div id="heatmapContainerWrapper">
      <div id="heatmapContainer">

      </div>
      <div id="heatmapLegend">
        <h2>Descriptive Legend Title</h2>
        <span id="min"></span>
        <span id="max"></span>
        <img id="gradient" src="" style="width:100%" />
      </div>
    </div>
	
	<div id="map"></div>

    
	  <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
     <script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
	    <script src="heatmap.js"></script>
        <script src="leaflet-heatmap.js"></script>
		<script src="gridded_n_vehicles.txt"></script>
		<script src="min_n_vehicles.txt"></script>
		<script src="max_n_vehicles.txt"></script>
		
		
    <script>
	
	
      window.onload = function() {
        // helper function
        function $(id) {
          return document.getElementById(id);
        };
		
		
		
	  var testData = {
          //max: 24,
		  data: gridded_data
        }; 
		
		
		var baseLayer = L.tileLayer(
          'http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
            attribution: 'Map data &copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors, <a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, Imagery © <a href="http://cloudmade.com">CloudMade</a>',
            maxZoom: 18
          }
        );


        /*  legend code */
        // we want to display the gradient, so we have to draw it
        var legendCanvas = document.createElement('canvas');
        legendCanvas.width = 100;
        legendCanvas.height = 10;

        var legendCtx = legendCanvas.getContext('2d');
        var gradientCfg = {};

        function updateLegend(data) {
          // the onExtremaChange callback gives us min, max, and the gradientConfig
          // so we can update the legend
          $('min').innerHTML = data.min;
          $('max').innerHTML = data.max;
          // regenerate gradient image
          if (data.gradient != gradientCfg) {
            gradientCfg = data.gradient;
            var gradient = legendCtx.createLinearGradient(0, 0, 100, 1);
            for (var key in gradientCfg) {
              gradient.addColorStop(key, gradientCfg[key]);
            }

            legendCtx.fillStyle = gradient;
            legendCtx.fillRect(0, 0, 100, 10);
            $('gradient').src = legendCanvas.toDataURL();
          }
        };
        /* legend code end */
		
		
	

        // create a heatmap instance
        var heatmap = h337.create({
          container: document.getElementById('heatmapContainer'),
          maxOpacity: .5,
          radius: 10,
          blur: .75,
          // update the legend whenever there's an extrema change
          onExtremaChange: function onExtremaChange(data) {
            updateLegend(data);
          }
        }); 
		
		
		 var cfg = {
          // radius should be small ONLY if scaleRadius is true (or small radius is intended)
          "radius": 0.02,
          "maxOpacity": .8, 
          // scales the radius based on map zoom
          "scaleRadius": true, 
          // if set to false the heatmap uses the global maximum for colorization
          // if activated: uses the data maximum within the current map boundaries 
          //   (there will always be a red spot with useLocalExtremas true)
          "useLocalExtrema": true,
          // which field name in your data represents the latitude - default "lat"
          latField: 'y',
          // which field name in your data represents the longitude - default "lng"
          lngField: 'x',
          // which field name in your data represents the data value - default "value"
          valueField: 'value'
		  
        };


       var heatmapLayer = new HeatmapOverlay(cfg);

        
		var width = 50
		var height = 50
		var max = max_n_vehicles;
		var min = min_n_vehicles;



		  
          heatmap.setData({
            min: min,
            max: max,
            // data: [{y:41.6755, x:42.78, value:10.3},{y:33, x:13, value:1},{y:41, x:13, value:3.3},{y:41, x:13, value:2.3}, {y:42.6755, x:42.78, value:10.3},{y:32, x:19, value:1-0},{y:48, x:13, value:3},{y:49, x:19, value:50.3}, {y:41.99641299999992, x:12.089475, value:1.0}]
		    data: gridded_data
		  }); 
		  
		  

	  
	  
	     var map = new L.Map('map', {
          center: new L.LatLng(41.8946, 12.4873),
          zoom: 11,
          layers: [baseLayer, heatmapLayer]
        });
		
		heatmapLayer.setData(testData);
		layer = heatmapLayer;
 


      };
    </script>
  </body>
</html>
